<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting — Saikiran</title>
    <meta http-equiv="refresh" content="5;url=https://saikiran-portfolio-2026.vercel.app/">
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #020617;
            --surface-color: rgba(15, 23, 42, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --font-heading: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-heading);
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background blur circles */
        .blur-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .circle-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, #3b82f6, transparent);
            top: -160px; right: -120px;
            animation: float1 9s ease-in-out infinite;
        }
        .circle-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, #8b5cf6, transparent);
            bottom: -120px; left: -100px;
            animation: float2 11s ease-in-out infinite;
        }
        @keyframes float1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-28px, 28px); } }
        @keyframes float2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(28px, -28px); } }

        /* Layout */
        .wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 2.5rem;
            text-decoration: none;
            color: var(--text-main);
            display: inline-block;
        }
        .logo .accent { color: var(--accent-primary); }

        /* Card */
        .card {
            background: var(--surface-color);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 3rem 3.5rem;
            max-width: 460px;
            width: 100%;
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .card-title {
            font-size: 1.55rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .card-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* SVG ring */
        .ring-wrap {
            position: relative;
            width: 136px;
            height: 136px;
            margin: 0 auto 1.25rem;
        }
        .ring-wrap svg { transform: rotate(-90deg); display: block; }

        .ring-track { fill: none; stroke: var(--surface-border); stroke-width: 6; }
        .ring-fill {
            fill: none;
            stroke: var(--accent-primary);
            stroke-width: 6;
            stroke-linecap: round;
            /* circumference of r=57: 2*pi*57 ~= 358.1 */
            stroke-dasharray: 358.1;
            stroke-dashoffset: 0;
            filter: drop-shadow(0 0 7px #3b82f6);
            animation: ring-drain 5s linear forwards;
        }
        @keyframes ring-drain {
            from { stroke-dashoffset: 0; }
            to   { stroke-dashoffset: 358.1; }
        }

        .countdown-num {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 2.8rem;
            font-weight: 700;
        }

        .status {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .status .num { color: var(--accent-primary); font-weight: 600; }

        /* Button */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.8rem;
            background: var(--accent-primary);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.72rem;
            color: var(--text-muted);
            opacity: 0.5;
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>

    <div class="blur-circle circle-1"></div>
    <div class="blur-circle circle-2"></div>

    <div class="wrapper">

        <a href="https://saikiran-portfolio-2026.vercel.app/" class="logo">
            Sai<span class="accent">kiran</span>.
        </a>

        <div class="card">
            <h1 class="card-title">Portfolio has moved&nbsp;&#x1F680;</h1>
            <p class="card-sub">I've launched a brand-new version of my portfolio.<br>You'll be redirected automatically.</p>

            <div class="ring-wrap">
                <svg width="136" height="136" viewBox="0 0 136 136">
                    <circle class="ring-track" cx="68" cy="68" r="57"/>
                    <circle class="ring-fill"  cx="68" cy="68" r="57"/>
                </svg>
                <div class="countdown-num" id="js-count">5</div>
            </div>

            <p class="status">
                Redirecting in <span class="num" id="js-sec">5</span> second<span id="js-plural">s</span>
            </p>

            <a href="https://saikiran-portfolio-2026.vercel.app/" class="btn">
                Take me there now <i class="fas fa-arrow-right"></i>
            </a>
        </div>

        <p class="footer-note">saikiran-portfolio-2026.vercel.app</p>
    </div>

    <script>
        const TARGET = 'https://saikiran-portfolio-2026.vercel.app/';
        let n = 5;
        const numEl    = document.getElementById('js-count');
        const secEl    = document.getElementById('js-sec');
        const pluralEl = document.getElementById('js-plural');

        const t = setInterval(() => {
            n--;
            numEl.textContent    = n;
            secEl.textContent    = n;
            pluralEl.textContent = n === 1 ? '' : 's';
            if (n <= 0) { clearInterval(t); window.location.replace(TARGET); }
        }, 1000);
    </script>

</body>
</html>
